name: Build and Deploy Web App

on:
  push:
    branches: ["main"] # or whatever your main branch is
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout root repo
        uses: actions/checkout@v4
        with:
          path: hcie
          
      - name: Checkout hcie-core
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/hcie-core
          path: hcie-core

      - name: Checkout hcie-shared
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/hcie-shared
          path: hcie-shared

      - name: Checkout hcie-tools
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/hcie-tools
          path: hcie-tools

      - name: Checkout hcie-io
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/hcie-io
          path: hcie-io

      - name: Checkout hcie-canvas-ui
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/hcie-canvas-ui
          path: hcie-canvas-ui

      - name: Checkout hcie-ui-components
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/hcie-ui-components
          path: hcie-ui-components
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install dependencies
        working-directory: hcie
        run: |
          npm install
          echo "Verifying dependencies..."
          ls -l node_modules/lzfjs || echo "lzfjs NOT FOUND in current node_modules"
        
      - name: Build Web App
        working-directory: hcie
        run: npm run web:build
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/ # Adjust if not deploying to project root

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'hcie/dist-web'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
